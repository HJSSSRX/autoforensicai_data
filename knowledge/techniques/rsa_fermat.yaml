name: RSA Fermat 分解
slug: rsa_fermat
category: 密码学

when_to_use:
  - n = p * q 且 p ≈ q (出题人故意弱密钥)
  - 已知公钥 (n, e), 缺私钥 d
  - 通用大整数分解 (yafu/msieve) 太慢, 但 Fermat 秒解

detect_signal:
  - n 接近完全平方 (位数 ≈ 2 * sqrt(n) 位数)
  - sqrt(n) 后立即试探 (a = ceil(sqrt(n))) 就能找到 b 使 a²-n=b²
  - 题目给的 n 较短 (1024-2048 bit) + 同目录有解密脚本

algorithm: |
  数学原理:
    n = p * q, 设 a = (p+q)/2, b = (q-p)/2
    则 a² - b² = pq = n, 即 b² = a² - n
    从 ceil(sqrt(n)) 开始递增 a, 直到 a²-n 是完全平方
    p = a - b, q = a + b

script:
  lang: python
  code: |
    from math import isqrt

    def fermat_factor(n: int) -> tuple[int, int] | None:
        """Fermat 分解: 仅在 p ≈ q 时高效"""
        a = isqrt(n) + 1
        for _ in range(10**6):  # 上限 100 万次防卡死
            b2 = a * a - n
            b = isqrt(b2)
            if b * b == b2:
                return a - b, a + b
            a += 1
        return None

    def rsa_recover_d(n: int, e: int = 65537) -> int:
        result = fermat_factor(n)
        if not result:
            raise RuntimeError("Fermat 失败, |p-q| 太大, 改用 yafu/msieve")
        p, q = result
        return pow(e, -1, (p-1) * (q-1))

seen_in:
  - FIC2026_INITIAL_C_Q4

common_pitfalls:
  - ❌ 用 sqrt() 浮点 → 大整数精度丢失, 必须 math.isqrt
  - ❌ 没设上限 → 当 |p-q| 大时无限循环
  - ❌ 没试 Fermat 就直接 yafu → 浪费时间

related_techniques:
  - rsa_common_modulus  # 共模攻击
  - rsa_low_e            # 低指数攻击
  - rsa_pollard_rho      # Pollard rho 分解
