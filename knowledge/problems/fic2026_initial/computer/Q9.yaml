script_snippets:
- lang: python
  purpose: MP4 stco 解密 (减 1337)
  code: "import struct\nfrom pathlib import Path\n\nKEY = 0x539  # 1337\n\ndef decrypt(path: Path):\n\
    \    data = bytearray(path.read_bytes())\n    idx = data.find(b'stco')\n    if idx == -1:\n      \
    \  return\n    entry_count = struct.unpack('>I', data[idx+8:idx+12])[0]\n    for i in range(entry_count):\n\
    \        pos = idx + 12 + i*4\n        old = struct.unpack('>I', data[pos:pos+4])[0]\n        if old\
    \ >= KEY:\n            data[pos:pos+4] = struct.pack('>I', old - KEY)\n    path.with_name(path.stem\
    \ + '_dec.mp4').write_bytes(data)"
common_mistakes:
- ❌ 没读 main.a, 不知道 stco 是被加密的位置
- ❌ 改 stco 时忘了 big-endian (mp4 box 数据是大端)
- ❌ 试图用通用 mp4 修复工具 (untrunc/MP4Box) → 不行, 因为 chunk_offset 全偏移了
lessons:
- 🎯 mp4 box 结构 stco = chunk_offset table, 是常见隐藏点 (改 offset 让播放失败但 metadata 还在)
- '🎯 stco 加密常见模式: 每个 offset ± 固定值 (1337 / 4096 / 0x10000)'
- 🎯 mp4 box header (4字节大小 + 4字节类型) → 大端 unpack '>I'
- 🎯 程序逆向中看 main.a / main.encrypt 类函数名, Go 习惯把功能拆到 a/b/c 单字母函数
