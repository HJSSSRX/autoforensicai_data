common_mistakes:
- ❌ 答 model_id 如 `minimax/minimax-m2.5:free` (这是模型本身, 不是类型/provider)
- ❌ 在配置文件里乱猜模型 ID, 没注意到题目的『类型』中文含义
lessons:
- 🎯 中文题『模型类型』= provider/category (OpenAI/OpenRouter/Anthropic), 不是 model_id
- 🎯 AI 软件 GUI 设置里『模型类型』是顶层下拉框, model_id 是次级选择
- 🎯 看到选项类提问优先取语义最大的层级
